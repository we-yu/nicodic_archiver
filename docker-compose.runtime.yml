services:
  personal_runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    environment:
      BATCH_LOG_DIR: /runtime/logs/batch_runs
      TARGET_DB_PATH: /app/data/nicodic.db
      SCRAPE_PAGE_DELAY_SECONDS: ${SCRAPE_PAGE_DELAY_SECONDS:-5.0}
      SOFT_TERMINATE_FILE: ${SOFT_TERMINATE_FILE:-runtime/control/stop_after_current}
      ONESHOT_LIMIT_DURATION_SECONDS: ${ONESHOT_LIMIT_DURATION_SECONDS:-}
      NICOARC_ISSUE_REPORT_SLACK_WEBHOOK_URL: "${NICOARC_ISSUE_REPORT_SLACK_WEBHOOK_URL:-}"
      NICOARC_ISSUE_REPORT_ENABLED: "${NICOARC_ISSUE_REPORT_ENABLED:-}"
      NICOARC_ISSUE_REPORT_TIMEOUT_SECONDS: "${NICOARC_ISSUE_REPORT_TIMEOUT_SECONDS:-}"
      NICOARC_ISSUE_REPORT_RATE_LIMIT_SECONDS: "${NICOARC_ISSUE_REPORT_RATE_LIMIT_SECONDS:-}"
      NICOARC_DAILY_REPORT_ENABLED: "${NICOARC_DAILY_REPORT_ENABLED:-}"
      DAILY_REPORT_STATE_PATH: "${DAILY_REPORT_STATE_PATH:-/app/data/daily_report_state.json}"
      TARGET_ADDITION_LOG_DIR: "${TARGET_ADDITION_LOG_DIR:-/runtime/logs/target_additions}"
    volumes:
      - ./runtime/control:/app/runtime/control
      - ./runtime/targets:/runtime/targets
      - ./runtime/data:/app/data
      - ./runtime/logs:/runtime/logs
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    stdin_open: true
    tty: true
    command:
      [
        "python",
        "main.py",
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--target-db-path",
        "/app/data/nicodic.db",
      ]
