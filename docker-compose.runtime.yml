services:
  personal_runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    environment:
      BATCH_LOG_DIR: /runtime/logs/batch_runs
      TARGET_DB_PATH: /app/data/nicodic.db
      SCRAPE_PAGE_DELAY_SECONDS: ${SCRAPE_PAGE_DELAY_SECONDS:-5.0}
    volumes:
      - ./runtime/targets:/runtime/targets
      - ./runtime/data:/app/data
      - ./runtime/logs:/runtime/logs
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    stdin_open: true
    tty: true
    command:
      [
        "python",
        "main.py",
        "web",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--target-db-path",
        "/app/data/nicodic.db",
      ]

